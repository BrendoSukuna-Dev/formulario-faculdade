<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="styles.css" media="screen"> 
    <title>FORMULÁRIO FACULDADE</title>
</head>
<body>

    <main class="container">
        <!-- Título e Subtítulo -->
        <header>
            <h1 id="titulo">FORMULÁRIO DE ALUNOS</h1>
            <p id="subtitulo">Complete as suas informações</p>
        </header>

        <form action="https://formspree.io/f/maqvwdde" method="POST">
            <!-- Seção de Identificação -->
            <div class="linha">
                <div class="campo">
                    <label for="nome">Nome</label>
                    <input type="text" name="nome" id="nome" placeholder="Seu nome" required>
                </div>

                <div class="campo">
                    <label for="sobrenome">Sobrenome</label>
                    <input type="text" name="sobrenome" id="sobrenome" placeholder="Seu sobrenome" required>
                </div>
            </div>

            <div class="linha">
                <div class="campo">
                    <label for="idade">Idade</label>
                    <input type="text" name="idade" id="idade" placeholder="Ex: 20" required>
                </div>

                <div class="campo">
                    <label for="email">Email</label>
                    <input type="email" name="email" id="email" placeholder="seu@email.com" required>
                </div>
            </div>

            <!-- Seção Acadêmica -->
            <div class="campo">
                <label for="curso">Qual o seu curso?</label>
                <input type="text" name="curso" id="curso" placeholder="Nome do curso" required>
            </div>

            <!-- Foco de Atuação -->
            <fieldset>
                <legend>Qual o seu foco de atuação?</legend>
                <div class="radio-group">
                    <label class="option-item"><input type="radio" name="foco" value="frontend" required> Front-end</label>
                    <label class="option-item"><input type="radio" name="foco" value="backend"> Back-end</label>
                    <label class="option-item"><input type="radio" name="foco" value="fullstack"> Fullstack</label>
                    <label class="option-item">
                        <input type="radio" name="foco" value="outras"> Outras: 
                        <input type="text" name="foco_outros" style="width: 80px; padding: 2px; margin-left: 5px;">
                    </label>
                </div>
            </fieldset>

            <!-- Senioridade -->
            <div class="campo">
                <label for="senioridade">Qual o seu nível de senioridade?</label>
                <select id="senioridade" name="senioridade" required>
                    <option selected disabled value="">Selecione</option>
                    <option value="sem_experiencia">Sem experiência</option>
                    <option value="estagiario">Estagiário(a)</option>
                    <option value="junior">Junior</option>
                    <option value="pleno">Pleno</option>
                    <option value="senior">Senior</option>
                </select>
            </div>

            <!-- Tecnologias -->
            <fieldset>
                <legend>Selecione as tecnologias que utiliza:</legend>
                <div class="checkbox-group">
                    <label class="option-item"><input type="checkbox" name="tech[]" value="HTML"> HTML</label>
                    <label class="option-item"><input type="checkbox" name="tech[]" value="CSS"> CSS</label>
                    <label class="option-item"><input type="checkbox" name="tech[]" value="JS"> JavaScript</label>
                    <label class="option-item"><input type="checkbox" name="tech[]" value="PHP"> PHP</label>
                    <label class="option-item"><input type="checkbox" name="tech[]" value="C#"> C#</label>
                    <label class="option-item"><input type="checkbox" name="tech[]" value="Python"> Python</label>
                    <label class="option-item"><input type="checkbox" name="tech[]" value="Java"> Java</label>
                </div>
            </fieldset>

            <!-- Experiência -->
            <div class="campo">
                <label for="experiencia">Conte um pouco da sua experiência:</label>
                <textarea id="experiencia" name="experiencia" placeholder="Descreva os seus projetos ou trajetória..." required></textarea>
            </div>

            <button class="botao" type="submit">Concluído</button>
        </form>
    </main>

    <footer class="footer">
        <p class="desenvolvido">Desenvolvido por: <strong>BrendoSukuna-Dev</strong></p>
        <a href="https://github.com/BrendoSukuna-Dev" target="_blank" class="github-link">
            <img width="40px" src="https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/github-white-icon.png" alt="Github" title="GITHUB"/>
        </a>
    </footer>

</body>
</html>
