<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="styles.css" media="screen"> 
    <title>FORMULÁRIO FACULDADE</title>
</head>
<body>

    <div>
        <h1 id="titulo">FORMULÁRIO DE ALUNOS</h1>
        <p id="subtitulo">Complete suas informoções</p>
        <br>
    </div>

    <form action="https://formspree.io/f/maqvwdde" method="POST">
        <fieldset class="grupo">
            <div class="linha">
                <div class="campo">
                    <label for="nome"><strong>Nome</strong></label>
                    <input type="text" name="nome" id="nome" required>
                </div>

                <div class="campo">
                    <label class="sobrenome" for="sobrenome"><strong>Sobrenome</strong></label>
                    <input type="text"  name="sobrenome" id="sobrenome" required>
                </div>
            </div>

            <div class="linha">
                <div class="campo">
                    <label for="idade"><strong>Idade</strong></label>
                    <input type="text"  name="idade" id="idade" required>
                </div>

                <div class="campo">
                    <label class="email" for="email"><strong>Email</strong></label>
                    <input type="email" name="email" id="email" required>
                </div>
            </div>

            <div class="campo">
                <label for="curso"><strong>Qual seu curso?</strong></label>
                <input type="text" name="curso" id="curso" required>
            </div>

            <div class="campo">
                <label><strong>Qual seu foco de atuação?</strong></label>
                <label>
                    <input type="radio" name="devweb" value="frontend" required>Front-end
                </label>
                <label>
                    <input type="radio" name="devweb" value="backend">Back-end
                </label>
                <label>
                    <input type="radio" name="devweb" value="fullstack">Fullstack
                </label>
                <label>
                    <input type="radio" name="devweb" value="outras">Outras
                    <input type="text" name="devweb" id="outras">
                </label>
            </div>

            <div class="campo">
                <label for="senioridade"><strong>Qual seu nível de senioridade?</strong></label>
                <select id="senioridade" required>
                    <option selected disabled value="">Selecione</option>
                    <option>Sem experiência</option>
                    <option>Estagiário(a)</option>
                    <option>Junior</option>
                    <option>Pleno</option>
                    <option>Senior</option>
                </select>
            </div>

            <fieldset class="grupo">
                <div id="check" required>
                    <label><strong>Selecione as tecnologias que utiliza:</strong></label><br><br>
                    <input type="checkbox" id="tecnologia1" name="tecnologia1" value="HTML">
                    <label for="tecnologia1">HTML</label>
                    <input type="checkbox" id="tecnologia2" name="tecnologia2" value="CSS">
                    <label for="tecnologia1">CSS</label>
                    <input type="checkbox" id="tecnologia3" name="tecnologia3" value="Javascript">
                    <label for="tecnologia1">JavaScript</label>
                    <input type="checkbox" id="tecnologia4" name="tecnologia4" value="PHP">
                    <label for="tecnologia1">PHP</label>
                    <input type="checkbox" id="tecnologia5" name="tecnologia5" value="C#">
                    <label for="tecnologia1">C#</label>
                    <input type="checkbox" id="tecnologia6" name="tecnologia6" value="Python">
                    <label for="tecnologia1">Python</label>
                    <input type="checkbox" id="tecnologia7" name="tecnologia7" value="Java">
                    <label for="tecnologia1">Java</label>
                </div>
            </fieldset>

            <div class="campo">
                <br>
                <label for="experiencia"><strong>Conte um pouco da sua experiência e expectativa profissional:</strong></label>
                <textarea rows="6" style="width: 26em" id="experiencia" name="experiencia" required></textarea>
            </div>

            <button class="botao" type="submit" onsubmit="">Concluido</button>
            <br>
            <br>
            <br>
            <p class="desenvolvido"><strong>Desenvolvido por:</strong> BrendoSukuna-Dev</p>
            <br>
            <code class="github">
                <a href="https://github.com/BrendoSukuna-Dev" target="_blank">
                <img width="40px" src="https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/github-white-icon.png" alt="Github" title="GUITHUB"/>
            </code>
            
        </fieldset>
    </form>

</body>
</html>
